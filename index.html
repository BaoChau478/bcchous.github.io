<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bcchous Blog</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    /* ===== BACKGROUND ===== */
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    /* ===== NAVBAR UPDATED ===== */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-weight: 700;
      font-size: 24px;      
      letter-spacing: 1px;
      background: linear-gradient(45deg, #fff, #093643);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .menu a {
      margin-left: 30px;
      text-decoration: none;
      color: white;
      font-size: 0.95rem;
      opacity: 0.8;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #00c6ff;
      opacity: 1;
    }

    /* ===== HERO ===== */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 10%;
      flex-wrap: wrap;
    }

    /* text */
    .hero-text {
      max-width: 500px;
    }

    .hero-text h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    .hero-text p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    /* button */
    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(0, 198, 255, 0.7);
    }

    /* avatar */
    .avatar {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 198, 255, 0.6);
      transition: 0.4s;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar:hover {
      transform: scale(1.05);
    }

    /* ===== BLOG SECTION ===== */
    .section {
      padding: 60px 10%;
    }

    .section h2 {
      margin-bottom: 30px;
    }

    /* cards */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* ===== RESPONSIVE ===== */
    @media(max-width:768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .avatar {
        margin-top: 30px;
      }
    }
  </style>

</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">Bcchous</div>
    <div class="menu">
      <a href="index.html">Home</a>

      <a href="#">Feedback</a>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-text">
      <h1>Welcome to<br>Bcchous's Home</h1>
      <p>No comment</p>
      <button class="btn">View My Projects</button>
    </div>

    <div class="avatar">
      <img src="avatar1.jpg" alt="avatar">      
    </div>

  </section>

  <!-- BLOG -->
  <section class="section">
    <h2>My services</h2>

    <div class="blog-grid">

      <div class="card" onclick="location.href='coursera.html'" style="cursor:pointer;">
        <h3>Coursera</h3>
        <p>Rush Coursera với giá rẻ?</p>
      </div>

      <div class="card" onclick="location.href='code.html'" style="cursor:pointer;">
        <h3>Code</h3>
        <p>Hỗ trợ code</p>
      </div>

      <div class="card">
        <h3>Sources</h3>
        <p>???</p>
      </div>

    </div>
  </section>
</body>

</html>
