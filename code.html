<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Price List</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-color: #00c6ff;
            --gold-color: #e1b382;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top right, #0a3d91, #021b4d, #000);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ===== NAVBAR FIXED (KHÔNG ĐẨY NỘI DUNG) ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: fixed; /* Bắt buộc để fixed */
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu a { margin-left: 30px; text-decoration: none; color: white; opacity: 0.8; transition: 0.3s; }
        .menu a:hover { color: var(--accent-color); opacity: 1; }

        /* ===== MAIN WRAPPER - TĂNG PADDING ĐỂ CHỮ CODE KHÔNG BỊ CHE ===== */
        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 150px; /* Tăng từ 80px lên 150px để hạ thấp card xuống */
            padding-bottom: 50px;
        }

        .container { width: 90%; max-width: 650px; position: relative; }

        .header-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 75px 45px 50px 45px; /* Padding top lớn */
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        /* Chữ Code màu Gold đè khung */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(4rem, 12vw, 5.5rem);
            position: absolute;
            top: -60px; /* Nhấc hẳn lên mép card */
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            background: linear-gradient(to bottom, #f9e2ae, var(--gold-color), #c18b56);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .price-item:last-child { border: none; }
        .price { color: #f9e2ae; font-weight: 300; }

        .footer-info { display: flex; justify-content: space-between; margin-top: 30px; padding: 0 10px; }
        .footer-info a { font-size: 0.85rem; color: var(--accent-color); text-decoration: none; opacity: 0.8; }
        .footer-info a:hover { opacity: 1; text-decoration: underline; }

        @media (max-width: 480px) {
            .main-wrapper { padding-top: 120px; }
            h1 { top: -45px; }
            .glass-card { padding: 60px 25px 30px 25px; }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">Bcchous</div>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="#">Feedback</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="container">
            <div class="header-info">
                <span>More options, contact me:</span>
                <a href="https://zalo.me/0358727045" target="_blank" style="color:var(--accent-color); text-decoration:none;">Zalo</a>
            </div>

            <div class="glass-card">
                <h1>Code</h1>
                <div class="price-item"><span>PRF / PRO / LAB</span><span class="price">500k - 1m5</span></div>
                <div class="price-item"><span>Full project PRJ - HCM</span><span class="price">1m2</span></div>
                <div class="price-item"><span>SWP</span><span class="price">500-1m5 + 2m doc</span></div>
                <div class="price-item"><span>SEP / EXE</span><span class="price">5m - 10m</span></div>
            </div>

            <div class="footer-info">
                <a href="https://www.facebook.com/bcchous" target="_blank">Facebook</a>
                <a href="mailto:chau47778@gmail.com">Mail</a>
            </div>
        </div>
    </div>
</body>
</html>
